<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IOT - DHT11</title>
    <!-- Thư viện Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        
        /* CSS cho phần hiển thị cảm biến */
        .sensor-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card h3 { margin: 0; color: #555; font-size: 18px; }
        .value { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .unit { font-size: 20px; color: #888; }
        
        .temp-card .value { color: #e74c3c; } /* Màu đỏ cho nhiệt độ */
        .hum-card .value { color: #3498db; }  /* Màu xanh cho độ ẩm */

        /* CSS cho phần điều khiển */
        .control-panel { margin-top: 30px; padding: 20px; background: white; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 10px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; transition: 0.3s; }
        .btn-on { background-color: #2ecc71; color: white; }
        .btn-off { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #status { font-weight: bold; margin-top: 10px; }
        .last-update { font-size: 12px; color: #888; margin-top: 5px; }
        #debug-log { font-size: 12px; color: #aaa; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Hệ thống Giám sát & Điều khiển IOT</h1>
    <div id="status" style="color: orange;">Đang kết nối tới HiveMQ...</div>

    <!-- KHU VỰC HIỂN THỊ CẢM BIẾN -->
    <div class="sensor-container">
        <div class="card temp-card">
            <h3>NHIỆT ĐỘ</h3>
            <div class="value"><span id="temp-val">--</span><span class="unit">°C</span></div>
        </div>
        <div class="card hum-card">
            <h3>ĐỘ ẨM</h3>
            <div class="value"><span id="hum-val">--</span><span class="unit">%</span></div>
        </div>
    </div>
    <div class="last-update">Cập nhật lần cuối: <span id="last-time">Chưa có dữ liệu</span></div>

    <!-- KHU VỰC ĐIỀU KHIỂN -->
    <div class="control-panel">
        <h3>Điều khiển Thiết bị</h3>
        <button id="btnOn" class="btn-on" onclick="sendCMD('ON')" disabled>BẬT ĐÈN</button>
        <button id="btnOff" class="btn-off" onclick="sendCMD('OFF')" disabled>TẮT ĐÈN</button>
        <div id="log" style="margin-top: 10px; font-size: 14px; color: gray;"></div>
    </div>

    <div id="debug-log">Log dữ liệu nhận được sẽ hiện ở đây...</div>

    <script>
        // --- CẤU HÌNH ---
        const mqtt_server = "f7a99425c8a34f23aba171e48336da3b.s1.eu.hivemq.cloud";
        const mqtt_port = 8884; // WebSocket Port
        const mqtt_user = "long140203";
        const mqtt_pass = "Long140203";
        
        const topic_pub = "esp8266/client"; // Gửi lệnh đi
        
        // ĐÃ SỬA: Cập nhật đúng topic theo log bạn gửi
        const topic_sub = "esp8266/dht11";   

        // Tạo Client
        const clientId = "WebMonitor-" + Math.random().toString(16).substr(2, 8);
        const client = new Paho.MQTT.Client(mqtt_server, mqtt_port, clientId);

        // Gán các hàm callback (Xử lý sự kiện)
        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        // Cấu hình kết nối
        const connectOptions = {
            useSSL: true,
            userName: mqtt_user,
            password: mqtt_pass,
            onSuccess: onConnect,
            onFailure: onFailure
        };

        // Bắt đầu kết nối
        client.connect(connectOptions);

        // --- CÁC HÀM XỬ LÝ ---

        function onConnect() {
            console.log("Connected to HiveMQ");
            document.getElementById("status").innerHTML = "● Đã kết nối hệ thống";
            document.getElementById("status").style.color = "green";
            
            // Kích hoạt nút bấm
            document.getElementById("btnOn").disabled = false;
            document.getElementById("btnOff").disabled = false;

            // Đăng ký nhận tin nhắn từ cảm biến
            client.subscribe(topic_sub);
            console.log("Đã đăng ký topic: " + topic_sub);
        }

        function onFailure(responseObject) {
            console.log("Connect failed: " + responseObject.errorMessage);
            document.getElementById("status").innerHTML = "Lỗi kết nối: " + responseObject.errorMessage;
            document.getElementById("status").style.color = "red";
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                console.log("Connection lost: " + responseObject.errorMessage);
                document.getElementById("status").innerHTML = "Mất kết nối!";
                document.getElementById("status").style.color = "red";
            }
        }

        // HÀM QUAN TRỌNG: Xử lý khi có tin nhắn mới từ ESP32 gửi lên
        function onMessageArrived(message) {
            const payload = message.payloadString;
            console.log("Nhận tin nhắn: " + payload);
            document.getElementById("debug-log").innerText = "Nhận từ [" + message.destinationName + "]: " + payload;
            
            // Chỉ xử lý nếu tin nhắn đến từ topic cảm biến
            if (message.destinationName === topic_sub) {
                try {
                    // JSON mẫu: {"humidity":22,"temperature":33.7}
                    const data = JSON.parse(payload);
                    
                    // ĐÃ SỬA: Đổi key thành 'temperature' và 'humidity' cho khớp với JSON
                    if(data.temperature !== undefined) {
                        document.getElementById("temp-val").innerText = data.temperature;
                    }
                    
                    if(data.humidity !== undefined) {
                        document.getElementById("hum-val").innerText = data.humidity;
                    }

                    // Cập nhật thời gian
                    const now = new Date();
                    document.getElementById("last-time").innerText = now.toLocaleTimeString();

                } catch (e) {
                    console.error("Lỗi phân tích dữ liệu JSON: ", e);
                }
            }
        }

        // Hàm gửi lệnh điều khiển
        function sendCMD(cmd) {
            const message = new Paho.MQTT.Message(cmd);
            message.destinationName = topic_pub;
            client.send(message);
            document.getElementById("log").innerText = "Đã gửi lệnh: " + cmd;
        }
    </script>
</body>
</html>
