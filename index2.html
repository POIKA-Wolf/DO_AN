<div class="control-panel" style="border: 2px dashed #2ecc71; margin-top: 20px;">
    <h3>Hệ thống Test Server</h3>
    <button onclick="triggerGitHubTest()" style="background-color: #27ae60; color: white;">BẬT ĐÈN TEST (GỌI PYTHON)</button>
    <div id="test-status" style="margin-top: 10px; color: blue; font-weight: bold;">Đang chờ lệnh...</div>
</div>

<script>
    // 1. Lắng nghe phản hồi từ Python qua MQTT
    client.subscribe("web/test/response"); 

    // Cập nhật hàm onMessageArrived
    const originalOnMessage = onMessageArrived;
    onMessageArrived = function(message) {
        if (message.destinationName === "web/test/response") {
            document.getElementById("test-status").innerText = "✔ " + message.payloadString;
            document.getElementById("test-status").style.color = "green";
        }
        originalOnMessage(message); // Giữ lại các chức năng cũ
    }

    async function triggerGitHubTest() {
        document.getElementById("test-status").innerText = "Đang gọi GitHub Server...";
        
        // CẤU HÌNH API GITHUB (Thay thế thông tin của bạn)
        const GITHUB_AUTH = "Bearer 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"; 
        const REPO_OWNER = "POIKA-Wolf";
        const REPO_NAME = "DO_AN";

        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': GITHUB_AUTH,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ event_type: 'trigger-test' })
            });

            if (response.status === 204) {
                document.getElementById("test-status").innerText = "Đã gửi lệnh thành công! Đợi máy ảo GitHub khởi động (khoảng 15-30s)...";
            } else {
                document.getElementById("test-status").innerText = "Lỗi API: " + response.status;
            }
        } catch (error) {
            document.getElementById("test-status").innerText = "Lỗi kết nối API GitHub!";
        }
    }
</script>
